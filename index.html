<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>MT5 UI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;

    height:100vh;
    overflow:hidden;

    -webkit-text-size-adjust:100%;

    display:flex;
    justify-content:center;
}

/* 手机 */

.phone{
    width:100%;
    max-width:390px;
    height:100vh;

    background:#000;

    position:relative;
    overflow:hidden;
}

/* 顶部 */

.top{
    padding:18px 16px 0;
}

/* 金额 */

.balance-title{
    text-align:center;

    color:#0a84ff;

    font-size:26px;
    font-weight:700;

    margin-bottom:18px;
}

/* 信息 */

.info-row{
    display:flex;
    justify-content:space-between;

    margin-bottom:8px;

    font-size:16px;

    color:#d0d0d0;
}

.info-row .value{
    color:#fff;
}

/* 标题 */

.positions-title{
    margin-top:20px;

    font-size:22px;
    font-weight:700;
}

/* 列表 */

.trade-list{
    position:absolute;

    top:225px;
    bottom:78px;
    left:0;
    right:0;

    overflow-y:auto;

    padding:0 16px;

    scrollbar-width:none;
}

.trade-list::-webkit-scrollbar{
    display:none;
}

/* 单条 */

.trade-item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 0;

    border-bottom:1px solid rgba(255,255,255,.04);
}

/* 左边 */

.trade-left{
    display:flex;
    flex-direction:column;
}

.symbol{
    font-size:18px;
    font-weight:700;

    margin-bottom:4px;
}

.sell{
    color:#ff3b30;
}

.price{
    color:#8e8e93;
    font-size:15px;
}

/* 盈利 */

.profit{
    color:#0a84ff;

    font-size:22px;
    font-weight:700;
}

/* 底栏 */

.bottom{
    position:absolute;
    left:0;
    bottom:0;

    width:100%;
    height:78px;

    padding-bottom:env(safe-area-inset-bottom);

    background:#050505;

    border-top:1px solid #111;

    display:flex;
    justify-content:space-around;
    align-items:center;
}

/* nav */

.nav{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:#7c7c80;

    font-size:12px;
}

.nav.active{
    color:#0a84ff;
}

/* 图标 */

.icon{
    width:26px;
    height:26px;

    margin-bottom:2px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* PNG 图标 */

.icon img{
    width:100%;
    height:100%;

    object-fit:contain;

    transition:.2s;
}
.mirror{
    transform:scale(-1);
}
.quotes-icon{
    transform:scale(.82);
}
/* Trade SVG */

.trade-svg svg{
    width:100%;
    height:100%;
}

.trade-svg{
    color:#0a84ff;
}

/* 默认灰色 */

.nav img{
    filter:
    brightness(0)
    saturate(100%)
    invert(50%);
}

/* 激活蓝色 */

.nav.active img{
    filter:
    brightness(0)
    saturate(100%)
    invert(43%)
    sepia(99%)
    saturate(1957%)
    hue-rotate(196deg)
    brightness(101%)
    contrast(101%);
}

/* 红点 */

.settings-wrap{
    position:relative;
}

.badge{
    position:absolute;

    top:-2px;
    right:-7px;

    width:16px;
    height:16px;

    background:#ff3b30;

    border-radius:50%;

    color:#fff;
    font-size:10px;

    display:flex;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body>

<div class="phone">

    <!-- 顶部 -->

    <div class="top">

        <div class="balance-title">
            33 820.00 USD
        </div>

        <div class="info-row">
            <span>Balance:</span>
            <span class="value">2 031.36</span>
        </div>

        <div class="info-row">
            <span>Equity:</span>
            <span class="value">35 851.36</span>
        </div>

        <div class="info-row">
            <span>Margin:</span>
            <span class="value">50 419.03</span>
        </div>

        <div class="info-row">
            <span>Free Margin:</span>
            <span class="value">-14 567.67</span>
        </div>

        <div class="info-row">
            <span>Margin Level (%):</span>
            <span class="value">71.11</span>
        </div>

        <div class="positions-title">
            Positions
        </div>

    </div>

    <!-- 订单列表 -->

    <div class="trade-list" id="tradeList"></div>

    <!-- 底栏 -->

    <div class="bottom">

        <div class="nav">

            <div class="icon" style="width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="width: 19.5px; height: 19.5px; display: block;">
    
    <!-- 左侧：向下短箭头（主干线再次拉长至 12px，谷底沉到 21） -->
    <path d="M7.5 9v12M7.5 21l-3-3M7.5 21l3-3" />

    <!-- 右侧：向上短箭头（主干线再次拉长至 12px，波峰冲到 3） -->
    <path d="M16.5 15V3M16.5 3l-3 3M16.5 3l3 3" />

</svg>



            </div>

            <span>Quotes</span>

        </div>

        <!-- Chart -->

        <div class="nav">

            <div class="icon">
                <img class="mirror" src="Chart.png">
            </div>

            <span>Chart</span>

        </div>

   <!-- Trade -->

<div class="nav active">

    <div class="icon trade-svg">

        <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">

            <!-- 外框 -->

            <rect
            x="2.5"
            y="2.5"
            width="19"
            height="19"
            rx="3.5"
            fill="none"
            />

            <!-- MT5走势 -->

          <path d="M5.5 17L9 12L13.5 15L18.5 7.5"/>






        </svg>

    </div>

    <span>Trade</span>

</div>

        <!-- History -->

        <div class="nav">

            <div class="icon">
                <img src="history.png">
            </div>

            <span>History</span>

        </div>

        <!-- Settings -->

        <div class="nav settings-wrap">

            <div class="badge">6</div>

            <div class="icon">
                <img src="settings.png">
            </div>

            <span>Settings</span>

        </div>

    </div>

</div>

<script>

const tradeList = document.getElementById("tradeList");

for(let i = 0; i < 15; i++){

    tradeList.innerHTML += `

        <div class="trade-item">

            <div class="trade-left">

                <div class="symbol">
                    XAUUSDm <span class="sell">sell 0.2</span>
                </div>

                <div class="price">
                    3338.771 → 3327.810
                </div>

            </div>

            <div class="profit">
                219.22
            </div>

        </div>

    `;
}

</script>

</body>
</html>

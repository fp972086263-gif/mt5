<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 Pure Dark Mode Perfect</title>
    <style>
        @import url('https://googleapis.com');
        
        /* 核心修复：让网页背景变灰，在中间强制画一个独立的手机屏幕 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #1c1c1e; /* 电脑端周围变深灰，衬托手机界面 */
            font-family: 'Roboto', -apple-system, sans-serif;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 模拟一台标准的安卓手机容器 */
        .phone-container {
            width: 100%;
            max-width: 412px; /* 严格限制最大宽度为标准安卓手机尺寸 */
            height: 100%;
            max-height: 860px; /* 严格限制最大高度 */
            background-color: #000000; /* 手机内部纯黑 */
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 顶部总盈利 */
        .header-total {
            position: relative;
            text-align: center;
            padding: 16px 0 12px 0;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .total-amount {
            color: #2f80ed;
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .plus-icon {
            position: absolute;
            right: 18px;
            top: 12px;
            font-size: 26px;
            color: #2f80ed;
            font-weight: 300;
        }

        /* 数据面板 */
        .account-info {
            padding: 10px 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .info-label {
            font-size: 14px;
            color: #8e8e93;
        }
        .info-value {
            font-size: 14px;
            color: #ffffff;
            font-weight: 700;
        }
        .negative {
            color: #ff453a !important;
        }

        /* Positions 栏 */
        .positions-bar {
            background-color: #151517;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 0.5px solid #1c1c1e;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .positions-title {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
        }
        .more-dots {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 订单列表 */
        .order-list {
            flex: 1;
            overflow-y: auto;
            background-color: #000000;
            padding-bottom: 65px; /* 留出底部空间 */
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .order-left {
            display: flex;
            flex-direction: column;
        }
        .order-title-row {
            font-size: 15px;
            margin-bottom: 4px;
        }
        .symbol-name {
            font-weight: 700;
            color: #ffffff;
        }
        .type-sell {
            color: #ff453a;
            font-weight: 500;
            margin-left: 6px;
            font-size: 14px;
        }
        .price-row {
            font-size: 13px;
            color: #8e8e93;
        }
        .arrow {
            margin: 0 5px;
            color: #8e8e93;
        }
        .order-right {
            font-size: 17px;
            font-weight: 700;
            color: #2f80ed;
        }

        /* 核心修正：让底部栏相对于手机容器定位，不再往电脑屏幕最底下掉 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: #0c0c0d;
            border-top: 0.5px solid #1c1c1e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
            z-index: 999;
            padding-bottom: 4px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #727274;
            font-size: 10px;
            width: 20%;
        }
        .nav-item.active {
            color: #2f80ed;
        }
        
        .icon-box {
            width: 22px;
            height: 22px;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Quotes */
        .icon-quotes {
            width: 14px;
            height: 14px;
            border-left: 1.5px solid #727274;
            border-right: 1.5px solid #727274;
            position: relative;
        }
        .icon-quotes::before {
            content: '';
            position: absolute;
            top: 2px; left: -4px;
            border-left: 3px solid transparent;
            border-right: 3px solid transparent;
            border-bottom: 4px solid #727274;
        }
        .icon-quotes::after {
            content: '';
            position: absolute;
            bottom: 2px; right: -4px;
            border-left: 3px solid transparent;
            border-right: 3px solid transparent;
            border-top: 4px solid #727274;
        }

        /* Chart */
        .icon-chart {
            width: 16px;
            height: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: relative;
            border-bottom: 1.5px solid #727274;
        }
        .icon-chart span {
            width: 3px;
            background-color: #727274;
        }
        .icon-chart span:nth-child(1) { height: 6px; }
        .icon-chart span:nth-child(2) { height: 11px; }
        .icon-chart span:nth-child(3) { height: 8px; }
        .icon-chart::before {
            content: '';
            position: absolute;
            top: 2px; left: 0; width: 14px; height: 6px;
            border-top: 1.5px solid #727274;
            transform: rotate(15deg);
        }

        /* Trade */
        .icon-trade {
            width: 16px;
            height: 13px;
            border: 1.5px solid #2f80ed;
            border-radius: 1px;
            position: relative;
        }
        .icon-trade::before {
            content: '';
            position: absolute;
            top: 4px; left: 2px;
            width: 10px; height: 3px;
            border-top: 1.5px solid #2f80ed;
            border-left: 1.5px solid #2f80ed;
            transform: rotate(10deg);
        }

        /* History */
        .icon-history {
            width: 14px;
            height: 14px;
            border: 1.5px solid #727274;
            border-radius: 50%;
            position: relative;
        }
        .icon-history::before {
            content: '';
            position: absolute;
            top: 3px; left: 6px;
            width: 1px; height: 4px;
            background-color: #727274;
        }
        .icon-history::after {
            content: '';
            position: absolute;
            top: 7px; left: 6px;
            width: 3px; height: 1px;
            background-color: #727274;
        }

        /* Messages */
        .icon-messages {
            width: 14px;
            height: 14px;
            border: 1.5px solid #727274;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-messages::before {
            content: '';
            width: 4px;
            height: 4px;
            background-color: #727274;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- 外层包裹手机容器 -->
    <div class="phone-container">

        <!-- 1. 顶部总盈利 -->
        <div class="header-total">
            <span class="total-amount">33 820.00 USD</span>

        </div>

        <!-- 2. 资金数据面板 -->
        <div class="account-info">

        <div class="positions-bar">

        <!-- 4. 持仓列表 -->
        <div class="order-list">

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MT Dark Trade UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.phone{
    width:390px;
    height:844px;
    background:#050505;
    overflow:hidden;
    position:relative;
}

.top{
    padding:25px 20px 10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.account{
    text-align:center;
    color:#3f8cff;
    font-size:38px;
    font-weight:600;
    margin-bottom:25px;
}

.info{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    font-size:20px;
    color:#d8d8d8;
}

.info span:last-child{
    color:#fff;
}

.positions-title{
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
    color:#fff;
}

.list{
    height:560px;
    overflow-y:auto;
    padding:10px 15px 120px;
}

.trade-item{
    padding:18px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left .pair{
    font-size:26px;
    font-weight:700;
    margin-bottom:8px;
}

.sell{
    color:#ff3b3b;
}

.left .price{
    font-size:22px;
    color:#bdbdbd;
}

.profit{
    font-size:38px;
    color:#3f8cff;
    font-weight:700;
}

.bottom{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:90px;
    background:#060606;
    border-top:1px solid rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav{
    text-align:center;
    color:#8c8c8c;
    font-size:16px;
}

.nav.active{
    color:#3f8cff;
}

.icon{
    font-size:28px;
    margin-bottom:6px;
}

.badge{
    position:absolute;
    top:-4px;
    right:-8px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:red;
    color:white;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.settings-wrap{
    position:relative;
}
</style>
</head>

<body>

<div class="phone">

    <div class="top">

        <div class="account">
            33 820.00 USD
        </div>

        <div class="info">
            <span>Balance:</span>
            <span>2 031.36</span>
        </div>

        <div class="info">
            <span>Equity:</span>
            <span>35 851.36</span>
        </div>

        <div class="info">
            <span>Margin:</span>
            <span>50 419.03</span>
        </div>

        <div class="info">
            <span>Free Margin:</span>
            <span>-14 567.67</span>
        </div>

        <div class="info">
            <span>Margin Level (%):</span>
            <span>71.11</span>
        </div>

        <div class="positions-title">
            Positions
        </div>

    </div>

    <div class="list">

        <!-- 重复订单 -->
        <script>
            for(let i=0;i<12;i++){

                document.write(`
                    <div class="trade-item">

                        <div class="left">
                            <div class="pair">
                                XAUUSDm <span class="sell">sell 0.2</span>
                            </div>

                            <div class="price">
                                3338.771 → 3327.810
                            </div>
                        </div>

                        <div class="profit">
                            219.22
                        </div>

                    </div>
                `)
            }
        </script>

    </div>

    <div class="bottom">

        <div class="nav">
            <div class="icon">⇅</div>
            Quotes
        </div>

        <div class="nav">
            <div class="icon">📊</div>
            Chart
        </div>

        <div class="nav active">
            <div class="icon">📈</div>
            Trade
        </div>

        <div class="nav">
            <div class="icon">🕘</div>
            History
        </div>

        <div class="nav settings-wrap">
            <div class="badge">6</div>
            <div class="icon">⚙</div>
            Settings
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 Perfect Android</title>
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Roboto', -apple-system, sans-serif;
            color: #ffffff;
            user-select: none;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 顶部总盈利 */
        .header-total {
            position: relative;
            text-align: center;
            padding: 16px 0 12px 0;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .total-amount {
            color: #2f80ed;
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .plus-icon {
            position: absolute;
            right: 18px;
            top: 12px;
            font-size: 26px;
            color: #2f80ed;
            font-weight: 300;
        }

        /* 数据面板 */
        .account-info {
            padding: 10px 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .info-label {
            font-size: 14px;
            color: #8e8e93;
        }
        .info-value {
            font-size: 14px;
            color: #ffffff;
            font-weight: 700;
        }
        .negative {
            color: #ff453a !important;
        }

        /* Positions 栏 */
        .positions-bar {
            background-color: #151517;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 0.5px solid #1c1c1e;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .positions-title {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
        }
        .more-dots {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 订单列表 */
        .order-list {
            flex: 1;
            overflow-y: auto;
            background-color: #000000;
            padding-bottom: 75px; 
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .order-left {
            display: flex;
            flex-direction: column;
        }
        .order-title-row {
            font-size: 15px;
            margin-bottom: 4px;
        }
        .symbol-name {
            font-weight: 700;
            color: #ffffff;
        }
        .type-sell {
            color: #ff453a;
            font-weight: 500;
            margin-left: 6px;
            font-size: 14px;
        }
        .price-row {
            font-size: 13px;
            color: #8e8e93;
        }
        .arrow {
            margin: 0 5px;
            color: #8e8e93;
        }
        .order-right {
            font-size: 17px;
            font-weight: 700;
            color: #2f80ed;
        }

        /* 终极解法：直接用真机裁剪下来的高清纯净原图作为全屏底部栏 */
        .bottom-nav-image {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px; /* 精确贴合真机导航栏比例 */
            background-image: url('https://postimg.cc');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 999;
            border-top: 0.5px solid #1c1c1e;
        }
    </style>
</head>
<body>

    <!-- 1. 顶部总盈利 -->
    <div class="header-total">
        <span class="total-amount">33 820.00 USD</span>
        <span class="plus-icon">+</span>
    </div>

    <!-- 2. 资金数据面板 -->
    <div class="account-info">
        <div class="info-row">
            <span class="info-label">Balance:</span>
            <span class="info-value">2 031.36</span>
        </div>
        <div class="info-row">
            <span class="info-label">Equity:</span>
            <span class="info-value">35 851.36</span>
        </div>
        <div class="info-row">
            <span class="info-label">Margin:</span>
            <span class="info-value">50 419.03</span>
        </div>
        <div class="info-row">
            <span class="info-label">Free Margin:</span>
            <span class="info-value negative">-14 567.67</span>
        </div>
        <div class="info-row">
            <span class="info-label">Margin Level (%):</span>
            <span class="info-value">71.11</span>
        </div>
    </div>

    <!-- 3. Positions 横条 -->
    <div class="positions-bar">
        <span class="positions-title">Positions</span>
        <span class="more-dots">...</span>
    </div>

    <!-- 4. 持仓列表 -->
    <div class="order-list">
        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.22</div>
        </div>

        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.22</div>
        </div>

        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.802</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.84</div>
        </div>
    </div>

    <!-- 5. 纯净真机图片切片导航栏（永不穿帮） -->
    <div class="bottom-nav-image"></div>

    <!-- 双击任何空白区域强制全屏刷新 -->
    <script>
        document.body.addEventListener('dblclick', function() {
            window.location.reload(true);
        });
    </script>
</body>
</html>

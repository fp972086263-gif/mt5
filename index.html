<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 Android Dark Mode LocalImage</title>
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Roboto', -apple-system, sans-serif;
            color: #ffffff;
            user-select: none;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 顶部总盈利 */
        .header-total {
            position: relative;
            text-align: center;
            padding: 16px 0 12px 0;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .total-amount {
            color: #2f80ed;
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .plus-icon {
            position: absolute;
            right: 18px;
            top: 12px;
            font-size: 26px;
            color: #2f80ed;
            font-weight: 300;
        }

        /* 数据面板 */
        .account-info {
            padding: 10px 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .info-label {
            font-size: 14px;
            color: #8e8e93;
        }
        .info-value {
            font-size: 14px;
            color: #ffffff;
            font-weight: 700;
        }
        .negative {
            color: #ff453a !important;
        }

        /* Positions 栏 */
        .positions-bar {
            background-color: #151517;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 0.5px solid #1c1c1e;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .positions-title {
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
        }
        .more-dots {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 订单列表 */
        .order-list {
            flex: 1;
            overflow-y: auto;
            background-color: #000000;
            padding-bottom: 75px; 
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .order-left {
            display: flex;
            flex-direction: column;
        }
        .order-title-row {
            font-size: 15px;
            margin-bottom: 4px;
        }
        .symbol-name {
            font-weight: 700;
            color: #ffffff;
        }
        .type-sell {
            color: #ff453a;
            font-weight: 500;
            margin-left: 6px;
            font-size: 14px;
        }
        .price-row {
            font-size: 13px;
            color: #8e8e93;
        }
        .arrow {
            margin: 0 5px;
            color: #8e8e93;
        }
        .order-right {
            font-size: 17px;
            font-weight: 700;
            color: #2f80ed;
        }

        /* 零请求纯内嵌真机底图：永不丢失、永不穿帮 */
        .bottom-nav-image {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 999;
            border-top: 0.5px solid #1c1c1e;
            /* 下方是将图片完全像素代码化后的 Base64 密文，手机无需联网即可直接画出原生底栏 */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAu4AAABACAYAAAD6k8p5AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAFiUAABYlAUlSJPAAAAJpSURBVHhe7d2xahRRFMDxM7vGgIWFpZVNpEwXwUorCxsLwcoHsEwXwVpby0orwVpby0orbe0DCH6A9bZ2wUKw0M7uGgMmZpYg7mSSTbI7M+f/wYXD7g7HzX/m3p07GwgAAAAAAAAAAADg69SajfF6vdmw9Gf8e8vG8f+XbBx3vWvPxtH6s3wZ9+Ouvvctn7Xn1wAAAAAAAIdSre9fXj986bUfPtvvX8fX30f719D6ZdjX9/vHn9f6/tXm0atbT78v94/f96vNxmjfAAAAAAAAgMOox0fH9b3L8fWzY38dH/09Xv8zNvZOfv29f0zL15vN0b5r7XfH8m69uX60v3Y6/vH6Z397p8ffN9ZOd66fP9rfP/m6vOfD8U/9XbT/AgAAAAAAgL/L3b/Ebyw/vL7Xfni9XN/9un6w/vj7bKwt68+P1x+Ptf682mxMtr1bO925vLp7ffvR/un6z7Z3bYm1o+Xv1p+PtXas9ffR9mX/K9vW2rLvevv9sbxbH+2f7vux9vzoz9b/AgAAAAAAwNfl99/f/fNPe9b+/+fv49+17b73vdfW++fve7++f7W+P9m2tvb86M9Z++fX96+27f9x683GaN8AAAAAAAAAp1BvNsbr9WbD0p/x7y0bx/9fsnHc9a49G0frz/Jl3I+7+t63fNaeXwMAAAAAAABAbyw/P9q6ft6ev/5/eXnv8vrhSy/L6+fH//8XAAAAAAAAAACAU6g3G+P1erNh6c/495aN4/8v2TjueveXjZ3L68v94/f9arMx2ncAAAAAAAAAp9BvNsbr9WbD0p/x7y1bXpbXN/uun98fe9eejePffb9//Hmt719tHr269fT7cv/4ff8HGbLgO02HwJMAAAAASUVORK5CYII=');
        }
    </style>
</head>
<body>

    <!-- 1. 顶部总盈利 -->
    <div class="header-total">
        <span class="total-amount">33 820.00 USD</span>
        <span class="plus-icon">+</span>
    </div>

    <!-- 2. 资金数据面板 -->
    <div class="account-info">
        <div class="info-row">
            <span class="info-label">Balance:</span>

        </div>
        <div class="info-row">

    <!-- 3. Positions 横条 -->
    <div class="positions-bar">
        <span class="positions-title">Positions</span>

    <!-- 4. 持仓列表 -->
    <div class="order-list">
        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>

                </div>
                <div class="price-row">
                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>

            </div>

        </div>

        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.22</div>
        </div>

        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.802</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.84</div>
        </div>
    </div>

    <!-- 5. 零网络请求内嵌原生底栏 -->
    <div class="bottom-nav-image"></div>

    <!-- 双击任何空白区域强制刷新 -->
    <script>
        document.body.addEventListener('dblclick', function() {
            window.location.reload(true);
        });
    </script>
</body>
</html>

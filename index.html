<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 100% Perfect Mode</title>
    <style>
        /* 引入与手机版系统最契合的专业数字字体 */
        @import url('https://googleapis.com');
        
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Roboto', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 核心沙盒：直接以真机原图作为基础背景，确保图标和排版100%一致 */
        .app-sandbox {
            position: relative;
            width: 100%;
            max-width: 412px; /* 完美锁定手机端宽度 */
            height: 100vh;
            background-image: url('https://postimg.cc');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            box-sizing: border-box;
        }

        /* 统一的定位和修改文字样式 */
        .editable-text {
            position: absolute;
            background-color: #000000; /* 用纯黑背景盖住原图下方的旧数字 */
            font-weight: 500;
            letter-spacing: -0.1px;
            display: inline-block;
        }

        /* ==================== 1. 顶部总数据区域 ==================== */
        .main-total {
            top: 2.1%;
            left: 50%;
            transform: translateX(-50%);
            color: #2f80ed;
            font-size: 21px;
            font-weight: 700;
            background: transparent; /* 顶部背景微调 */
            letter-spacing: -0.3px;
        }

        /* ==================== 2. 数据面板面板区 ==================== */
        .val-balance { top: 7.0%; right: 4.5%; color: #ffffff; font-size: 15px; font-weight: 700; text-align: right; width: 120px; }
        .val-equity { top: 9.7%; right: 4.5%; color: #ffffff; font-size: 15px; font-weight: 700; text-align: right; width: 120px; }
        .val-margin { top: 12.3%; right: 4.5%; color: #ffffff; font-size: 15px; font-weight: 700; text-align: right; width: 120px; }
        /* 负数红色特别高亮 */
        .val-free-margin { top: 15.0%; right: 4.5%; color: #ff453a; font-size: 15px; font-weight: 700; text-align: right; width: 120px; }
        .val-level { top: 17.6%; right: 4.5%; color: #ffffff; font-size: 15px; font-weight: 700; text-align: right; width: 120px; }

        /* ==================== 3. 动态列表持仓单 (下方第一笔单子) ==================== */
        /* 如果您有多笔单子，可以直接用相同逻辑定位叠加 */
        .order-block {
            position: absolute;
            top: 27.2%; /* 精确锁定原图第一行持仓位置 */
            left: 0;
            width: 100%;
            height: 52px;
            background-color: #000000;
        }
        .symbol-title { position: absolute; top: 4px; left: 16px; color: #ffffff; font-size: 15px; font-weight: 700; }
        .order-type { position: absolute; top: 6px; left: 95px; color: #ff453a; font-size: 13px; font-weight: 500; }
        .order-prices { position: absolute; bottom: 4px; left: 16px; color: #8e8e93; font-size: 13px; }
        .order-profit { position: absolute; top: 12px; right: 16px; color: #2f80ed; font-size: 17px; font-weight: 700; }

        /* 第二笔持仓单遮罩复刻 */
        .order-block-2 {
            position: absolute;
            top: 34.6%; 
            left: 0;
            width: 100%;
            height: 52px;
            background-color: #000000;
        }

        /* 第三笔持仓单遮罩复刻 */
        .order-block-3 {
            position: absolute;
            top: 42.0%; 
            left: 0;
            width: 100%;
            height: 52px;
            background-color: #000000;
        }
    </style>
</head>
<body>

    <!-- 锁定真机比例的画布 -->
    <div class="app-sandbox">

        <!-- 1. 顶部总盈利数字 (想改什么直接改这里) -->
        <div class="editable-text main-total">33 820.00 USD</div>

        <!-- 2. 右侧核心数据面板 (想改哪个数字，直接编辑对应的数值) -->
        <div class="editable-text val-balance">2 031.36</div>
        <div class="editable-text val-equity">35 851.36</div>
        <div class="editable-text val-margin">50 419.03</div>
        <div class="editable-text val-free-margin">-14 567.67</div>
        <div class="editable-text val-level">71.11</div>

        <!-- 3. 持仓单列表第 1 行 -->
        <div class="order-block">
            <span class="symbol-title">XAUUSDm</span>
            <span class="order-type">sell 0.2</span>
            <div class="order-prices">3338.771 &rarr; 3327.810</div>
            <span class="order-profit">219.22</span>
        </div>

        <!-- 持仓单列表第 2 行 -->
        <div class="order-block-2">
            <span class="symbol-title" style="position: absolute; top: 4px; left: 16px; color: #ffffff; font-size: 15px; font-weight: 700;">XAUUSDm</span>
            <span class="order-type" style="position: absolute; top: 6px; left: 95px; color: #ff453a; font-size: 13px;">sell 0.2</span>
            <div class="order-prices" style="position: absolute; bottom: 4px; left: 16px; color: #8e8e93; font-size: 13px;">3338.771 &rarr; 3327.810</div>
            <span class="order-profit" style="position: absolute; top: 12px; right: 16px; color: #2f80ed; font-size: 17px; font-weight: 700;">219.22</span>
        </div>

        <!-- 持仓单列表第 3 行 -->
        <div class="order-block-3">
            <span class="symbol-title" style="position: absolute; top: 4px; left: 16px; color: #ffffff; font-size: 15px; font-weight: 700;">XAUUSDm</span>
            <span class="order-type" style="position: absolute; top: 6px; left: 95px; color: #ff453a; font-size: 13px;">sell 0.2</span>
            <div class="order-prices" style="position: absolute; bottom: 4px; left: 16px; color: #8e8e93; font-size: 13px;">3338.802 &rarr; 3327.810</div>
            <span class="order-profit" style="position: absolute; top: 12px; right: 16px; color: #2f80ed; font-size: 17px; font-weight: 700;">219.84</span>
        </div>

    </div>

    <!-- 隐藏的双击强制刷新脚本，确保改动即时生效 -->
    <script>
        document.body.addEventListener('dblclick', function() {
            window.location.reload(true);
        });
    </script>
</body>
</html>

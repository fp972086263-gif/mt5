<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 Trade Page Clone</title>
    <style>
        /* 基础样式与暗黑模式背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 85px; /* 留出底部导航栏空间 */
        }

        /* 强制数字等宽，防止间距不均 */
        .num-font {
            font-variant-numeric: tabular-nums;
        }

        /* 顶部头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 16px 10px 16px;
            position: sticky;
            top: 0;
            background-color: #000000;
            z-index: 10;
        }
        .header .icon {
            font-size: 22px;
            cursor: pointer;
            user-select: none;
        }
        .header .title {
            font-size: 21px;
            font-weight: 600;
            color: #2196F3; /* 原图的盈利蓝色 */
        }
        .header .title span {
            font-size: 14px;
            font-weight: 500;
            margin-left: 4px;
        }

        /* 账户数据概览区 */
        .account-summary {
            padding: 5px 16px 15px 16px;
            font-size: 14px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .summary-label {
            color: #8e8e93; /* 次要灰色 */
        }
        .summary-value {
            color: #ffffff;
            font-weight: 500;
        }
        .text-red {
            color: #ff3b30 !important; /* 负数亏损红 */
        }

        /* 持仓区域标题 */
        .positions-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 8px 16px;
            font-size: 15px;
            font-weight: 600;
        }
        .positions-title-bar .more-icon {
            color: #ffffff;
            letter-spacing: -1px;
            font-size: 18px;
        }

        /* 持仓列表条目 */
        .position-list {
            display: flex;
            flex-direction: column;
        }
        .position-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .pos-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .pos-header {
            font-size: 15px;
            font-weight: 600;
        }
        .pos-type-sell {
            color: #ff3b30; /* sell 提示红 */
            margin-left: 4px;
            font-weight: 500;
        }
        .pos-prices {
            font-size: 13px;
            color: #8e8e93;
        }
        .pos-arrow {
            margin: 0 4px;
            font-size: 12px;
        }
        .pos-right-profit {
            font-size: 17px;
            font-weight: 600;
            color: #2196F3; /* 单笔盈利蓝 */
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #161616;
            border-top: 0.5px solid #2c2c2e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 12px; /* 适配全面屏底部小黑条空间 */
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8e8e93;
            text-decoration: none;
            font-size: 10px;
            gap: 4px;
            position: relative;
            flex: 1;
        }
        .nav-item.active {
            color: #2196F3; /* 激活项蓝色 */
        }
        .nav-icon {
            font-size: 20px;
            line-height: 1;
        }
        /* 设置图标的红点角标 */
        .badge {
            position: absolute;
            top: -2px;
            right: 25%;
            background-color: #ff3b30;
            color: white;
            font-size: 10px;
            font-weight: 600;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- 1. 顶部状态栏 -->
    <div class="header">
        <!-- 左侧账户切换小图标，用 SVG 完美复刻 -->
        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#8e8e93"/><line x1="3" y1="9" x2="21" y2="9" stroke="#8e8e93"/><line x1="9" y1="21" x2="9" y2="9" stroke="#8e8e93"/></svg>
        <div class="title num-font">33 820.00<span>USD</span></div>
        <div class="icon" style="color: #2196F3; font-weight: 300;">＋</div>
    </div>

    <!-- 2. 账户概览区 -->
    <div class="account-summary num-font">
        <div class="summary-row">
            <span class="summary-label">Balance:</span>
            <span class="summary-value">2 031.36</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Equity:</span>
            <span class="summary-value">35 851.36</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Margin:</span>
            <span class="summary-value">50 419.03</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Free Margin:</span>
            <span class="summary-value text-red">-14 567.67</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Margin Level (%):</span>
            <span class="summary-value">71.11</span>
        </div>
    </div>

    <!-- 3. 持仓列表区 -->
    <div class="positions-title-bar">
        <span>Positions</span>
        <span class="more-icon">•••</span>
    </div>

    <div class="position-list num-font">
        <!-- 循环生成的单条持仓（精确对照原图点位） -->
        <!-- 前 9 条数据：建仓价 3338.771，盈利 219.22 -->
        <script>
            const posData1 = { symbol: "XAUUSDm", type: "sell 0.2", open: "3338.771", current: "3327.810", profit: "219.22" };
            const posData2 = { symbol: "XAUUSDm", type: "sell 0.2", open: "3338.802", current: "3327.810", profit: "219.84" };
            
            function generateRow(item) {
                document.write(`
                    <div class="position-item">
                        <div class="pos-left">
                            <div class="pos-header">${item.symbol}<span class="pos-type-sell">${item.type}</span></div>
                            <div class="pos-prices"><span>${item.open}</span><span class="pos-arrow">→</span><span>${item.current}</span></div>
                        </div>
                        <div class="pos-right-profit">${item.profit}</div>
                    </div>
                `);
            }

            // 渲染前 9 条相同持仓
            for(let i=0; i<9; i++) { generateRow(posData1); }
            // 渲染后 2 条持仓
            for(let i=0; i<2; i++) { generateRow(posData2); }
        </script>
    </div>

    <!-- 4. 底部导航栏 -->
    <div class="bottom-nav">
        <a href="#" class="nav-item">
            <div class="nav-icon">⇄</div>
            <div>Quotes</div>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">📊</div>
            <div>Chart</div>
        </a>
        <a href="#" class="nav-item active">
            <!-- 激活状态的 Trade 图标 -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 12h4l3-5 4 10 3-5h3"/></svg>
            <div>Trade</div>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">🕒</div>
            <div>History</div>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">⚙️</div>
            <div>Settings</div>
            <div class="badge">6</div> <!-- 角标数字 6 -->
        </a>
    </div>

</body>
</html>

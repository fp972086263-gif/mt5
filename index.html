<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 Dark Mode Perfect</title>
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            user-select: none;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 顶部总盈利 */
        .header-total {
            position: relative;
            text-align: center;
            padding: 18px 0 14px 0;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .total-amount {
            color: #2f80ed;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .plus-icon {
            position: absolute;
            right: 16px;
            top: 14px;
            font-size: 26px;
            color: #2f80ed;
            font-weight: 300;
        }

        /* 数据面板 */
        .account-info {
            padding: 10px 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .info-label {
            font-size: 15px;
            color: #8e8e93;
        }
        .info-value {
            font-size: 15px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .negative {
            color: #ff453a !important;
        }

        /* Positions 栏 */
        .positions-bar {
            background-color: #1c1c1e;
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .positions-title {
            font-size: 13px;
            color: #aeaeae;
            font-weight: 600;
        }
        .more-dots {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 订单列表滚动区 */
        .order-list {
            flex: 1;
            overflow-y: auto;
            background-color: #000000;
            padding-bottom: 75px; 
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .order-left {
            display: flex;
            flex-direction: column;
        }
        .order-title-row {
            font-size: 15px;
            margin-bottom: 3px;
        }
        .symbol-name {
            font-weight: 700;
            color: #ffffff;
        }
        .type-sell {
            color: #ff453a;
            font-weight: 500;
            margin-left: 4px;
            font-size: 14px;
        }
        .price-row {
            font-size: 13px;
            color: #8e8e93;
        }
        .arrow {
            margin: 0 4px;
            color: #8e8e93;
        }
        .order-right {
            font-size: 18px;
            font-weight: 600;
            color: #2f80ed;
            letter-spacing: -0.2px;
        }

        /* 底部导航栏：完美复刻MT5真机质感 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: #161618;
            border-top: 0.5px solid #2c2c2e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            box-sizing: border-box;
            z-index: 999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #727274;
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            width: 20%;
        }
        .nav-item.active {
            color: #2f80ed; /* 激活状态蓝 */
        }
        .nav-icon-svg {
            width: 23px;
            height: 23px;
            margin-bottom: 3px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <!-- 1. 顶部总盈利 -->
    <div class="header-total">
        <span class="total-amount">33 820.00 USD</span>
        <span class="plus-icon">+</span>
    </div>

    <!-- 2. 资金数据面板 -->
    <div class="account-info">
        <div class="info-row">
            <span class="info-label">Balance:</span>
            <span class="info-value">2 031.36</span>
        </div>
        <div class="info-row">
            <span class="info-label">Equity:</span>
            <span class="info-value">35 851.36</span>
        </div>
        <div class="info-row">
            <span class="info-label">Margin:</span>
            <span class="info-value">50 419.03</span>
        </div>
        <div class="info-row">
            <span class="info-label">Free Margin:</span>
            <span class="info-value negative">-14 567.67</span>
        </div>
        <div class="info-row">
            <span class="info-label">Margin Level (%):</span>
            <span class="info-value">71.11</span>
        </div>
    </div>

    <!-- 3. Positions 横条 -->
    <div class="positions-bar">
        <span class="positions-title">Positions</span>
        <span class="more-dots">...</span>
    </div>

    <!-- 4. 持仓列表 -->
    <div class="order-list">
        <!-- 可根据需要复制或修改数据 -->
        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.22</div>
        </div>

        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.22</div>
        </div>

        <div class="order-item">
            <div class="order-left">
                <div class="order-title-row">
                    <span class="symbol-name">XAUUSDm</span>
                    <span class="type-sell">sell 0.2</span>
                </div>
                <div class="price-row">
                    <span>3338.802</span><span class="arrow">→</span><span>3327.810</span>
                </div>
            </div>
            <div class="order-right">219.84</div>
        </div>
    </div>

    <!-- 5. 底部高仿原生导航栏（100%仿照MT5真机图标） -->
    <div class="bottom-nav">
        <!-- Quotes 行情 -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24">
                <path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/>
            </svg>
            <div>Quotes</div>
        </div>
        <!-- Chart 图表 -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 14H9v-4h2v4zm4 0h-2V7h2v10zm4 0h-2v-7h2v7z"/>
            </svg>
            <div>Chart</div>
        </div>
        <!-- Trade 交易 (高亮激活) -->
        <div class="nav-item active">
            <svg class="nav-icon-svg" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/>
            </svg>
            <div>Trade</div>
        </div>
        <!-- History 历史 -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24">
                <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8h-1z"/>
            </svg>
            <div>History</div>
        </div>
        <!-- Settings 设置 -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24">
                <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l-.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
            </svg>
            <div>Settings</div>
        </div>
    </div>

    <!-- 隐藏的“双击刷新”脚本，解决手机不更新内容的问题 -->
    <script>
        document.body.addEventListener('dblclick', function() {
            window.location.reload(true);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>MT5 Trade UI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;

    height:100vh;
    overflow:hidden;

    -webkit-text-size-adjust:100%;

    display:flex;
    justify-content:center;
}

/* 手机 */

.phone{
    width:100%;
    max-width:390px;
    height:100vh;

    background:#000;

    position:relative;
    overflow:hidden;
}

/* 顶部 */

.top{
    padding:18px 16px 0;
}

/* 标题 */

.balance-title{
    text-align:center;

    color:#0a84ff;

    font-size:26px;
    font-weight:700;

    margin-bottom:18px;
}

/* 信息 */

.info-row{
    display:flex;
    justify-content:space-between;

    margin-bottom:8px;

    font-size:16px;

    color:#d0d0d0;
}

.info-row .value{
    color:#fff;
}

/* Positions */

.positions-title{
    margin-top:20px;

    font-size:22px;
    font-weight:700;
}

/* 列表 */

.trade-list{
    position:absolute;

    top:225px;
    bottom:78px;
    left:0;
    right:0;

    overflow-y:auto;

    padding:0 16px;

    scrollbar-width:none;
}

.trade-list::-webkit-scrollbar{
    width:0;
    height:0;
}

/* 单条 */

.trade-item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 0;

    border-bottom:1px solid rgba(255,255,255,.04);
}

/* 左边 */

.trade-left{
    display:flex;
    flex-direction:column;
}

/* 品种 */

.symbol{
    font-size:18px;
    font-weight:700;

    margin-bottom:4px;
}

.sell{
    color:#ff3b30;
}

/* 价格 */

.price{
    color:#8e8e93;
    font-size:15px;
}

/* 盈利 */

.profit{
    color:#0a84ff;

    font-size:22px;
    font-weight:700;
}

/* 底栏 */

.bottom{
    position:absolute;
    left:0;
    bottom:0;

    width:100%;
    height:78px;

    padding-bottom:env(safe-area-inset-bottom);

    background:#050505;

    border-top:1px solid #111;

    display:flex;
    justify-content:space-around;
    align-items:center;
}

/* nav */

.nav{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:#7c7c80;

    font-size:12px;
}

.nav.active{
    color:#0a84ff;
}

/* icon */

.icon{
    width:26px;
    height:26px;

    margin-bottom:2px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* SVG */

.icon svg{
    width:100%;
    height:100%;

    stroke:currentColor;
    fill:none;

    stroke-width:2.3;

    stroke-linecap:round;
    stroke-linejoin:round;
}

.icon svg *{
    fill:none;
}

/* 红点 */

.settings-wrap{
    position:relative;
}

.badge{
    position:absolute;

    top:-2px;
    right:-7px;

    width:16px;
    height:16px;

    background:#ff3b30;

    border-radius:50%;

    color:#fff;
    font-size:10px;

    display:flex;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body>

<div class="phone">

    <!-- 顶部 -->

    <div class="top">

        <div class="balance-title">
            33 820.00 USD
        </div>

        <div class="info-row">
            <span>Balance:</span>
            <span class="value">2 031.36</span>
        </div>

        <div class="info-row">
            <span>Equity:</span>
            <span class="value">35 851.36</span>
        </div>

        <div class="info-row">
            <span>Margin:</span>
            <span class="value">50 419.03</span>
        </div>

        <div class="info-row">
            <span>Free Margin:</span>
            <span class="value">-14 567.67</span>
        </div>

        <div class="info-row">
            <span>Margin Level (%):</span>
            <span class="value">71.11</span>
        </div>

        <div class="positions-title">
            Positions
        </div>

    </div>

    <!-- 列表 -->

    <div class="trade-list" id="tradeList"></div>

    <!-- 底栏 -->

    <div class="bottom">

        <!-- Quotes -->

        <div class="nav">

            <div class="icon">

<svg viewBox="0 0 24 24">

    <!-- 上箭头 -->

    <path d="M8 10L12 6L16 10"/>
    <path d="M12 6V14"/>

    <!-- 下箭头 -->

    <path d="M8 14L12 18L16 14"/>
    <path d="M12 10V18"/>

</svg>

            </div>

            <span>Quotes</span>

        </div>

        <!-- Chart -->

        <div class="nav">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <line x1="6" y1="4" x2="6" y2="20"/>

                    <rect
                    x="4"
                    y="8"
                    width="4"
                    height="5"
                    fill="none"
                    />

                    <line x1="12" y1="4" x2="12" y2="20"/>

                    <rect
                    x="10"
                    y="6"
                    width="4"
                    height="8"
                    fill="none"
                    />

                    <line x1="18" y1="4" x2="18" y2="20"/>

                    <rect
                    x="16"
                    y="9"
                    width="4"
                    height="6"
                    fill="none"
                    />

                </svg>

            </div>

            <span>Chart</span>

        </div>

        <!-- Trade -->

        <div class="nav active">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <rect
                    x="4"
                    y="4"
                    width="16"
                    height="16"
                    rx="2"
                    fill="none"
                    />

                    <path d="M7 14L10 10L13 13L17 8"/>

                </svg>

            </div>

            <span>Trade</span>

        </div>

        <!-- History -->

        <div class="nav">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <path d="M4 12a8 8 0 1 0 3-6"/>

                    <path d="M4 4v5h5"/>

                    <path d="M12 8v5l3 2"/>

                </svg>

            </div>

            <span>History</span>

        </div>

        <!-- Settings -->

        <div class="nav settings-wrap">

            <div class="badge">6</div>

            <div class="icon">

               <svg viewBox="0 0 24 24">

    <!-- 外圈 -->

    <circle cx="12" cy="12" r="7"/>

    <!-- 齿 -->

    <path d="M12 2V5"/>
    <path d="M12 19V22"/>

    <path d="M2 12H5"/>
    <path d="M19 12H22"/>

    <path d="M5 5L7 7"/>
    <path d="M17 17L19 19"/>

    <path d="M17 7L19 5"/>
    <path d="M5 19L7 17"/>

    <!-- MT5 中间柱状图 -->

    <rect
    x="9"
    y="12"
    width="1.5"
    height="4"
    fill="none"
    />

    <rect
    x="11.25"
    y="9"
    width="1.5"
    height="7"
    fill="none"
    />

    <rect
    x="13.5"
    y="7"
    width="1.5"
    height="9"
    fill="none"
    />

</svg>

            </div>

            <span>Settings</span>

        </div>

    </div>

</div>

<script>

const tradeList = document.getElementById("tradeList");

for(let i = 0; i < 15; i++){

    tradeList.innerHTML += `

        <div class="trade-item">

            <div class="trade-left">

                <div class="symbol">
                    XAUUSDm <span class="sell">sell 0.2</span>
                </div>

                <div class="price">
                    3338.771 → 3327.810
                </div>

            </div>

            <div class="profit">
                219.22
            </div>

        </div>

    `;
}

</script>

</body>
</html>

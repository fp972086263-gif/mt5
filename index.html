<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT5 Perfect Dark Mode</title>
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            user-select: none;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 顶部总盈利 */
        .header-total {
            position: relative;
            text-align: center;
            padding: 18px 0 14px 0;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .total-amount {
            color: #2f80ed;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .plus-icon {
            position: absolute;
            right: 16px;
            top: 14px;
            font-size: 26px;
            color: #2f80ed;
            font-weight: 300;
        }

        /* 数据面板 */
        .account-info {
            padding: 10px 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .info-label {
            font-size: 15px;
            color: #8e8e93;
        }
        .info-value {
            font-size: 15px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .negative {
            color: #ff453a !important;
        }

        /* Positions 栏 */
        .positions-bar {
            background-color: #1c1c1e;
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .positions-title {
            font-size: 13px;
            color: #aeaeae;
            font-weight: 600;
        }
        .more-dots {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 订单列表 */
        .order-list {
            flex: 1;
            overflow-y: auto;
            background-color: #000000;
            padding-bottom: 80px; 
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid #1c1c1e;
        }
        .order-left {
            display: flex;
            flex-direction: column;
        }
        .order-title-row {
            font-size: 15px;
            margin-bottom: 3px;
        }
        .symbol-name {
            font-weight: 700;
            color: #ffffff;
        }
        .type-sell {
            color: #ff453a;
            font-weight: 500;
            margin-left: 4px;
            font-size: 14px;
        }
        .price-row {
            font-size: 13px;
            color: #8e8e93;
        }
        .arrow {
            margin: 0 4px;
            color: #8e8e93;
        }
        .order-right {
            font-size: 18px;
            font-weight: 600;
            color: #2f80ed;
            letter-spacing: -0.2px;
        }

        /* 底部导航栏：完美像素级还原真机样式 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: #121212;
            border-top: 0.5px solid #1c1c1e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 12px;
            box-sizing: border-box;
            z-index: 999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #636366; /* 仿 iOS 未激活灰色 */
            font-size: 10px;
            font-weight: 400;
            width: 20%;
            position: relative;
        }
        .nav-item.active {
            color: #2f80ed; /* 激活高亮蓝色 */
        }
        .nav-icon-svg {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
        }
        
        /* 针对真机 Settings 右上角红色数字 6 提示角标 */
        .badge {
            position: absolute;
            top: -2px;
            right: 18px;
            background-color: #ff3b30;
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- 1. 顶部总盈利 -->
    <div class="header-total">
        <span class="total-amount">33 820.00 USD</span>

    <!-- 2. 资金数据面板 -->

                </div>

                    <span>3338.771</span><span class="arrow">→</span><span>3327.810</span>

            </div>
            <div class="order-right">219.22</div>
        </div>

        <div class="order-item">
            <div class="order-left">

    <!-- 5. 底部像素级高仿原生导航栏 -->
    <div class="bottom-nav">
        <!-- Quotes -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="6" height="6" rx="1" />
                <path d="M6 11v8M4 16l2 3 2-3" />
                <rect x="15" y="13" width="6" height="6" rx="1" />
                <path d="M18 13V5M16 8l2-3 2 3" />
            </svg>
            <div>Quotes</div>
        </div>
        <!-- Chart -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="6" y1="20" x2="6" y2="10" />
                <line x1="12" y1="20" x2="12" y2="4" />
                <line x1="18" y1="20" x2="18" y2="13" />
                <path d="M3 12l6-5 6 7 6-8" />
            </svg>
            <div>Chart</div>
        </div>
        <!-- Trade (高亮激活) -->
        <div class="nav-item active">
            <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="16" rx="2" />
                <path d="M7 14l3-3 4 3 4-4" />
            </svg>
            <div>Trade</div>
        </div>

                <circle cx="12" cy="12" r="9" />
                <polyline points="12 7 12 12 15 14" />
                <path d="M12 3a9 9 0 0 1 6 3" stroke-dasharray="2 2"/>
            </svg>
            <div>History</div>
        </div>
        <!-- Settings -->
        <div class="nav-item">
            <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MT5 Trade UI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#000;
    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
    overflow:hidden;
}

/* 手机 */

.phone{
    width:390px;
    height:844px;

    background:#000;
    color:#fff;

    position:relative;
    overflow:hidden;
}

/* 顶部 */

.top{
    padding:18px 16px 10px;
}

/* 标题 */

.balance-title{
    text-align:center;

    color:#1e90ff;

    font-size:28px;
    font-weight:600;

    margin-bottom:20px;
}

/* 信息 */

.info-row{
    display:flex;
    justify-content:space-between;

    margin-bottom:10px;

    font-size:18px;
    color:#d0d0d0;
}

.info-row .value{
    color:#fff;
}

/* positions */

.positions-title{
    margin-top:20px;

    font-size:24px;
    font-weight:bold;
}

/* 列表 */

.trade-list{
    position:absolute;

    top:230px;
    bottom:88px;
    left:0;
    right:0;

    overflow-y:auto;

    padding:0 14px;
}

/* 单条 */

.trade-item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 0;

    border-bottom:1px solid rgba(255,255,255,0.04);
}

/* 左边 */

.trade-left{
    display:flex;
    flex-direction:column;
}

/* 品种 */

.symbol{
    font-size:18px;
    font-weight:bold;

    margin-bottom:6px;
}

.sell{
    color:#ff3b30;
}

/* 价格 */

.price{
    color:#9a9a9a;
    font-size:16px;
}

/* 盈利 */

.profit{
    color:#1e90ff;

    font-size:24px;
    font-weight:bold;
}

/* 底栏 */

.bottom{
    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:88px;

    background:#0b0b0b;

    border-top:1px solid #151515;

    display:flex;
    justify-content:space-around;
    align-items:center;
}

/* nav */

.nav{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:#8d8d8d;

    font-size:12px;
}

/* 激活 */

.nav.active{
    color:#1e90ff;
}

/* icon */

.icon{
    width:24px;
    height:24px;

    margin-bottom:5px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* SVG */

.icon svg{
    width:100%;
    height:100%;

    overflow:visible;

    stroke:currentColor;
    fill:none;

    stroke-width:1.8;

    stroke-linecap:round;
    stroke-linejoin:round;
}

/* 强制所有 svg 子元素透明 */

.icon svg *{
    fill:none;
}

/* 红点 */

.settings-wrap{
    position:relative;
}

.badge{
    position:absolute;

    top:-2px;
    right:-8px;

    width:18px;
    height:18px;

    background:#ff3b30;

    border-radius:50%;

    color:#fff;
    font-size:11px;

    display:flex;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body>

<div class="phone">

    <!-- 顶部 -->

    <div class="top">

        <div class="balance-title">
            33 820.00 USD
        </div>

        <div class="info-row">
            <span>Balance:</span>
            <span class="value">2 031.36</span>
        </div>

        <div class="info-row">
            <span>Equity:</span>
            <span class="value">35 851.36</span>
        </div>

        <div class="info-row">
            <span>Margin:</span>
            <span class="value">50 419.03</span>
        </div>

        <div class="info-row">
            <span>Free Margin:</span>
            <span class="value">-14 567.67</span>
        </div>

        <div class="info-row">
            <span>Margin Level (%):</span>
            <span class="value">71.11</span>
        </div>

        <div class="positions-title">
            Positions
        </div>

    </div>

    <!-- 列表 -->

    <div class="trade-list" id="tradeList"></div>

    <!-- 底栏 -->

    <div class="bottom">

        <!-- Quotes -->

        <div class="nav">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <path d="M8 5L3 10L8 15"/>
                    <path d="M16 9L21 14L16 19"/>

                    <path d="M3 10H13"/>
                    <path d="M11 14H21"/>

                </svg>

            </div>

            <span>Quotes</span>

        </div>

        <!-- Chart -->

        <div class="nav">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <line x1="7" y1="4" x2="7" y2="20"/>

                    <rect
                    x="5.5"
                    y="7"
                    width="3"
                    height="6"
                    />

                    <line x1="17" y1="4" x2="17" y2="20"/>

                    <rect
                    x="15.5"
                    y="11"
                    width="3"
                    height="6"
                    />

                </svg>

            </div>

            <span>Chart</span>

        </div>

        <!-- Trade -->

        <div class="nav active">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <rect
                    x="4"
                    y="4"
                    width="16"
                    height="16"
                    rx="2"
                    />

                    <path d="M7 14L10 10L13 13L17 8"/>

                </svg>

            </div>

            <span>Trade</span>

        </div>

        <!-- History -->

        <div class="nav">

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <path d="M5 7V3"/>
                    <path d="M5 3H9"/>
                    <path d="M5 3L9 7"/>

                    <circle cx="13" cy="13" r="7"/>

                    <path d="M13 9V13L16 16"/>

                </svg>

            </div>

            <span>History</span>

        </div>

        <!-- Settings -->

        <div class="nav settings-wrap">

            <div class="badge">6</div>

            <div class="icon">

                <svg viewBox="0 0 24 24">

                    <circle cx="12" cy="12" r="3"/>

                    <path d="M12 2V5"/>
                    <path d="M12 19V22"/>

                    <path d="M2 12H5"/>
                    <path d="M19 12H22"/>

                    <path d="M5 5L7 7"/>
                    <path d="M17 17L19 19"/>

                    <path d="M17 7L19 5"/>
                    <path d="M5 19L7 17"/>

                </svg>

            </div>

            <span>Settings</span>

        </div>

    </div>

</div>

<script>

const tradeList = document.getElementById("tradeList");

for(let i=0;i<12;i++){

    tradeList.innerHTML += `

        <div class="trade-item">

            <div class="trade-left">

                <div class="symbol">
                    XAUUSDm <span class="sell">sell 0.2</span>
                </div>

                <div class="price">
                    3338.771 → 3327.810
                </div>

            </div>

            <div class="profit">
                219.22
            </div>

        </div>

    `;
}

</script>

</body>
</html>
